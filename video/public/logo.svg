<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Shield outline -->
  <path d="M256 32 L448 128 L448 288 C448 400 256 480 256 480 C256 480 64 400 64 288 L64 128 Z"
        stroke="#a78bfa" stroke-width="12" fill="none" opacity="0.9"/>

  <!-- Inner shield glow -->
  <path d="M256 56 L424 140 L424 280 C424 376 256 448 256 448 C256 448 88 376 88 280 L88 140 Z"
        fill="#a78bfa" opacity="0.06"/>

  <!-- Magnifying glass circle -->
  <circle cx="256" cy="220" r="100" stroke="#a78bfa" stroke-width="8" fill="none" opacity="0.8"/>

  <!-- Magnifying glass handle -->
  <line x1="330" y1="294" x2="390" y2="354" stroke="#a78bfa" stroke-width="10" stroke-linecap="round" opacity="0.8"/>

  <!-- Circuit nodes inside magnifying glass -->
  <circle cx="220" cy="200" r="8" fill="#a78bfa"/>
  <circle cx="280" cy="190" r="8" fill="#a78bfa"/>
  <circle cx="240" cy="250" r="8" fill="#a78bfa"/>
  <circle cx="290" cy="240" r="8" fill="#a78bfa"/>
  <circle cx="256" cy="200" r="6" fill="#a78bfa" opacity="0.5"/>

  <!-- Circuit lines connecting nodes -->
  <line x1="220" y1="200" x2="280" y2="190" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="190" x2="290" y2="240" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="200" x2="240" y2="250" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="250" x2="290" y2="240" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="200" x2="240" y2="250" stroke="#a78bfa" stroke-width="2" opacity="0.3"/>

  <!-- Scan line effect -->
  <line x1="180" y1="220" x2="332" y2="220" stroke="#a78bfa" stroke-width="2" opacity="0.3"/>
</svg>
