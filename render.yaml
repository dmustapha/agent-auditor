services:
  - type: worker
    name: agent-auditor-bot
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    region: oregon
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: VENICE_API_KEY
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: BLOCKLIST_CONTRACT_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_USE_TESTNET
        value: "true"
      - key: LOOP_INTERVAL_MS
        value: "300000"
